    ReceivedLikeProfile:
      type: object
      description: A profile that liked the current user.
      properties:
        id:
          type: string
        username:
          type: string
        avatar_url:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        city:
          type: string
          nullable: true
        is_verified:
          type: boolean
        plan:
          type: string
        is_super:
          type: boolean
          description: True if this was a SuperLike.
        liked_at:
          type: string
          description: ISO timestamp of the like action.
      required: [id, username, is_verified, plan, is_super, liked_at]

    ReceivedLikesResponse:
      type: object
      properties:
        count:
          type: integer
          description: Total number of pending likes received (always returned).
