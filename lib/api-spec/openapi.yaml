        profiles:
          type: array
          items:
            $ref: "#/components/schemas/ReceivedLikeProfile"
      required: [count, can_see, profiles]

    BoostStatus:
      type: object
      properties:
        active:
          type: boolean
          description: True if a boost is currently running.
        expires_at:
          type: string
          nullable: true
          description: ISO timestamp when the current boost expires. Null when not active.
        credits_available:
          type: integer
          description: Current like-credit balance available to spend on a boost.
      required: [active, credits_available]
