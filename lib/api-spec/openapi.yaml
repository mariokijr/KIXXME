openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profiles
    description: User profile operations
  - name: conversations
    description: Conversations and messages
  - name: billing
    description: Subscription billing and checkout
  - name: support
    description: Support requests and problem reports
  - name: live
    description: KixxMe Live — Gold-only video calls (scaffold)
  - name: account
    description: Account self-service — deactivation and deletion (email-verified)
  - name: reports
    description: User-to-user moderation reports
  - name: moderation
    description: Current user's moderation state
  - name: admin
    description: Admin-only moderation dashboard
  - name: rewards
    description: Daily streaks and reward claims (gamification)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required: [message]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required: [refresh_token]
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/Session"
                required: [session]
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password-reset email
      description: >
        Always responds 200 to avoid leaking whether an account exists. When the
        email matches a user, a Spanish reset email with a time-limited link is
        sent. The reset redirect target is derived server-side (never client-
        supplied) to prevent open-redirect / phishing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Set a new password using a recovery token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated; a fresh session is returned when auto sign-in succeeds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired recovery link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get the current user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update the current user's profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a public profile by user ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/avatar:
    post:
      operationId: uploadAvatar
      tags: [profiles]
      summary: Upload a profile photo (base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "200":
          description: Avatar URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url:
                    type: string
                required: [avatar_url]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List public profiles for discovery (excludes current user)
      security:
        - bearerAuth: []
      parameters:
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, distance, online]
        - name: scope
          in: query
          required: false
          description: >
            Geographic scope filter for the world map. nearby/province are
            relative to the viewer's location (return an empty list when the
            viewer has no coordinates); spain/europe use bounding boxes;
            worldwide returns everyone. When present, Gold profiles are ordered
            first (priority visibility).
          schema:
            type: string
            enum: [nearby, province, spain, europe, worldwide]
      responses:
        "200":
          description: Array of public profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/stats:
    get:
      operationId: getDiscoveryStats
      tags: [profiles]
      summary: Community stats for the world map (registered + online counts)
      description: >
        Counts of registered and currently-online users within the given scope,
        excluding the viewer and any blocked/deactivated users.
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [nearby, province, spain, europe, worldwide]
      responses:
        "200":
          description: Discovery stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos:
    get:
      operationId: listMyPhotos
      tags: [profiles]
      summary: List current user's profile photos
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfilePhoto"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadPhoto
      tags: [profiles]
      summary: Upload a profile photo (base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPhotoRequest"
      responses:
        "201":
          description: Uploaded photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilePhoto"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos/{photoId}:
    delete:
      operationId: deletePhoto
      tags: [profiles]
      summary: Delete a profile photo
      security:
        - bearerAuth: []
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos/{photoId}/avatar:
    patch:
      operationId: setPhotoAsAvatar
      tags: [profiles]
      summary: Set a photo as the avatar
      security:
        - bearerAuth: []
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List current user's conversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrGetConversation
      tags: [conversations]
      summary: Get or create a conversation with another user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                other_user_id:
                  type: string
              required: [other_user_id]
      responses:
        "200":
          description: Existing conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "201":
          description: New conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [conversations]
      summary: List messages in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/images:
    post:
      operationId: uploadChatImage
      tags: [conversations]
      summary: Upload an image to send in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "201":
          description: Uploaded image
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_url:
                    type: string
                required: [image_url]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/location:
    put:
      operationId: updateMyLocation
      tags: [profiles]
      summary: Update the current user's GPS location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdateRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/likes:
    get:
      operationId: listMyLikes
      tags: [profiles]
      summary: List profiles the current user has liked
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liked profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos/reorder:
    post:
      operationId: reorderPhotos
      tags: [profiles]
      summary: Reorder the current user's photos
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderPhotosRequest"
      responses:
        "200":
          description: Reordered photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfilePhoto"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/photos:
    get:
      operationId: listProfilePhotos
      tags: [profiles]
      summary: List a user's public photos
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfilePhoto"

  /profiles/{id}/like:
    post:
      operationId: likeProfile
      tags: [profiles]
      summary: Like or SuperLike a profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LikeRequest"
      responses:
        "201":
          description: Liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Like or SuperLike limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unlikeProfile
      tags: [profiles]
      summary: Remove a like from a profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unliked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /likes/quota:
    get:
      operationId: getLikeQuota
      tags: [likes]
      summary: Current like & SuperLike allowances for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeQuota"

  /me/rewards:
    get:
      operationId: getRewards
      tags: [rewards]
      summary: Current streak, daily-reward claim state, and reward credits
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rewards state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewardsState"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/rewards/claim:
    post:
      operationId: claimDailyReward
      tags: [rewards]
      summary: Claim today's daily reward (once per UTC calendar day)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reward claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimRewardResponse"
        "409":
          description: Already claimed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/block:
    post:
      operationId: blockProfile
      tags: [profiles]
      summary: Block a user (prevents messaging and hides them)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unblockProfile
      tags: [profiles]
      summary: Unblock a previously blocked user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /conversations/{id}/read:
    post:
      operationId: markConversationRead
      tags: [conversations]
      summary: Mark all incoming messages in a conversation as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/{messageId}:
    delete:
      operationId: deleteMessage
      tags: [conversations]
      summary: Delete one of the current user's messages
      security:
        - bearerAuth: []
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stripe/checkout:
    post:
      operationId: createStripeCheckout
      tags: [billing]
      summary: Create a Stripe Checkout session for a subscription plan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Stripe error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /support/reports:
    post:
      operationId: createSupportReport
      tags: [support]
      summary: Submit a support request or report a problem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportReportRequest"
      responses:
        "201":
          description: Report received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportReportResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications/summary:
    get:
      operationId: getNotificationsSummary
      tags: [notifications]
      summary: Aggregated in-app notifications (unread messages, likes, matches)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notification summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /live/queue:
    post:
      operationId: joinLiveQueue
      tags: [live]
      summary: Join the random video-call matchmaking queue (Gold only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveQueueRequest"
      responses:
