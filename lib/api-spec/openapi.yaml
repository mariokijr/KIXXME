                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: startSupportInboxThread
      tags: [admin]
      summary: Start (or continue) a user's support thread and post a message
      description: >-
        Operator-only. Gold-aware cold start: a Gold target's message lands in
        the official thread; a non-Gold target gets an admin-initiated outreach
        ticket they can answer.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSupportThreadBody"
      responses:
        "201":
          description: Thread started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tickets:
    get:
      operationId: listAdminTickets
      tags: [admin]
      summary: List all support tickets with status filter
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, answered, closed, urgent]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: adminCreateTicket
      tags: [admin]
      summary: Start a support ticket with any user (even non-Gold)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateTicketRequest"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Target user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/tickets/{id}/status:
    post:
      operationId: setAdminTicketStatus
      tags: [admin]
      summary: Set a support ticket's status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetTicketStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/photos/{photoId}:
    delete:
      operationId: adminRemovePhoto
      tags: [admin]
      summary: Remove a reported photo
      security:
        - bearerAuth: []
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/verification:
    get:
      operationId: getMyVerification
      tags: [profiles]
      summary: Current user's profile-verification status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Verification status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyVerificationStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: requestVerification
      tags: [profiles]
      summary: Request profile verification (manual admin review)
      description: >-
        Submits a verification request with a mandatory identity SELFIE. The
        selfie is stored privately and shown only to admins for review; it never
        becomes a public profile photo.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVerificationBody"
      responses:
        "200":
          description: Updated verification status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyVerificationStatus"
        "400":
          description: Missing or invalid selfie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already verified or a request is already pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/devices:
    post:
      operationId: registerDevice
      tags: [notifications]
      summary: Register (upsert) a push-notification device token
      description: >-
        Registers an FCM device token for the current user so the server can send
        native push notifications. Idempotent: re-registering the same token just
        refreshes its owner and last-seen time.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDeviceBody"
      responses:
        "200":
          description: Device registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid token or platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unregisterDevice
      tags: [notifications]
      summary: Remove a push-notification device token (on logout)
      description: >-
        The token is sent in the request body (not the URL) so it never lands in
        access logs. Removing an unknown token is a no-op success.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnregisterDeviceBody"
      responses:
        "200":
          description: Device removed (or was already absent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/visitors:
    get:
      operationId: getMyVisitors
      tags: [profiles]
      summary: Who viewed my profile (identities for Plus/Gold, count for free)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Visitors summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyVisitorsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/verifications:
    get:
      operationId: listAdminVerifications
      tags: [admin]
      summary: Pending verification requests (Gold-priority ordered)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending verification requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVerificationList"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/verifications/{id}/review:
    post:
      operationId: reviewAdminVerification
      tags: [admin]
      summary: Approve or reject a verification request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewVerificationRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Request is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          nullable: true
          description: >-
            Optional machine-readable error code (e.g.
            "gold_required_no_match") so the client can branch without parsing
            the human message.
      required: [error]

    RegisterDeviceBody:
      type: object
      properties:
        token:
          type: string
          description: FCM registration token from the device.
        platform:
          type: string
          enum: [ios, android, web]
      required: [token, platform]

    UnregisterDeviceBody:
      type: object
      properties:
        token:
          type: string
          description: FCM registration token to remove.
      required: [token]

    CheckoutRequest:
      type: object
      properties:
        tier:
          type: string
          enum: [plus, gold]
        interval:
          type: string
          enum: [month, year]
        returnUrl:
          type: string
          description: Absolute URL on an allowed Replit domain to return to after checkout
      required: [tier, interval, returnUrl]

    CheckoutResponse:
      type: object
      properties:
        url:
          type: string
          description: Stripe-hosted Checkout URL to redirect the user to
      required: [url]

    TrialStatusResponse:
      type: object
      properties:
        eligible:
          type: boolean
          description: Whether this user may start a free trial (no prior trial used).
        reason:
          type: string
          nullable: true
          description: Reason for ineligibility when eligible is false (e.g. already_used).
      required: [eligible]

    StartTrialRequest:
      type: object
      properties:
        returnUrl:
          type: string
          description: Absolute URL on an allowed Replit domain to return to after checkout
      required: [returnUrl]

    SupportReportRequest:
      type: object
      properties:
        category:
          type: string
          enum: [contact, chat, profile, settings, general]
          description: Where the report originated / its nature
        targetUserId:
          type: string
          description: Profile being reported, when applicable
        subject:
          type: string
          maxLength: 200
        message:
          type: string
          minLength: 1
          maxLength: 5000
        contactEmail:
          type: string
          description: Optional reply-to address supplied by the reporter
      required: [category, message]

    SupportReportResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, status, createdAt]

    SupportTicket:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [pending, answered, closed, urgent]
        subject:
          type: string
        openedByRole:
          type: string
          enum: [user, admin]
        lastMessageAt:
          type: string
        lastSenderRole:
          type: string
          enum: [user, admin]
        lastMessagePreview:
          type: string
          nullable: true
        unread:
          type: boolean
          description: True when the other side has unread messages for the viewer
        createdAt:
          type: string
        updatedAt:
          type: string
        username:
          type: string
          nullable: true
          description: Ticket owner's username (admin views only)
        avatarUrl:
          type: string
          nullable: true
          description: Ticket owner's avatar (admin views only)
        canReply:
          type: boolean
          description: >-
            Whether the requesting viewer may post a new message. Premium
            tickets (official / user-opened) require Gold to send into; admins
            and admin-initiated outreach are always replyable. Only set on the
            ticket-detail response; absent means allowed.
      required:
        [
          id,
          userId,
          status,
          subject,
          openedByRole,
          lastMessageAt,
          lastSenderRole,
          unread,
          createdAt,
          updatedAt,
        ]

    SupportTicketMessage:
      type: object
      properties:
        id:
          type: string
        ticketId:
          type: string
        senderId:
          type: string
        senderRole:
          type: string
          enum: [user, admin]
        body:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        audioUrl:
          type: string
          nullable: true
        audioDuration:
          type: integer
          nullable: true
          description: Voice-note length in seconds (1–60)
        createdAt:
          type: string
      required: [id, ticketId, senderId, senderRole, body, createdAt]

    SupportTicketDetail:
      type: object
      properties:
        ticket:
          $ref: "#/components/schemas/SupportTicket"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SupportTicketMessage"
      required: [ticket, messages]

    OfficialSupportTicketResponse:
      type: object
      properties:
        ticket:
          allOf:
            - $ref: "#/components/schemas/SupportTicket"
          nullable: true
          description: The official "Soporte KixxMe" thread, or null when not Gold
      required: [ticket]

    SupportTicketList:
      type: object
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/SupportTicket"
        total:
          type: integer
      required: [tickets, total]

    SupportInboxUser:
      type: object
      description: A user row in the support-console directory.
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        plan:
          type: string
          enum: [free, plus, gold]
        isVerified:
          type: boolean
        isOnline:
          type: boolean
        lastActiveAt:
          type: string
          nullable: true
        state:
          type: string
          enum: [active, suspended, banned, removed]
      required: [id, plan, isVerified, isOnline, state]

    SupportInboxList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/SupportInboxUser"
        total:
          type: integer
      required: [users, total]

    SupportInboxThread:
      type: object
      description: >-
        A user's canonical support thread from the operator perspective. `ticket`
        is null when the user has no support thread yet.
      properties:
        ticket:
          allOf:
            - $ref: "#/components/schemas/SupportTicket"
          nullable: true
        messages:
          type: array
          items:
            $ref: "#/components/schemas/SupportTicketMessage"
      required: [ticket, messages]

    StartSupportThreadBody:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 5000
      required: [message]

    OpenSupportTicketRequest:
      type: object
      properties:
        subject:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
          minLength: 1
          maxLength: 5000
      required: [subject, message]

    SupportMessageRequest:
      type: object
      description: At least one of body, imageUrl, or audioUrl must be present.
      properties:
        body:
          type: string
          maxLength: 5000
        imageUrl:
          type: string
        audioUrl:
          type: string
        audioDuration:
          type: integer
          minimum: 1
          maximum: 60

    AdminCreateTicketRequest:
      type: object
      properties:
        userId:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 200
        message:
          type: string
          minLength: 1
          maxLength: 5000
      required: [userId, subject, message]

    SetTicketStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [pending, answered, closed, urgent]
      required: [status]

    LikeNotification:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        created_at:
          type: string
        is_super:
          type: boolean
        revealed:
          type: boolean
      required: [user_id, username, avatar_url, created_at, is_super, revealed]

    QuotaState:
      type: object
      properties:
        remaining:
          type: integer
        limit:
          type: integer
        unlimited:
          type: boolean
        rechargeAt:
          type: string
          nullable: true
        credits:
          type: integer
          description: >
            Bonus reward credits available for this kind, already folded into
            `remaining`. Surfaced separately so the UI can show e.g. "15 (+5)".
      required: [remaining, limit, unlimited, rechargeAt, credits]

    LikeQuota:
      type: object
      properties:
        plan:
          type: string
          enum: [free, plus, gold]
        likes:
          $ref: "#/components/schemas/QuotaState"
        superlikes:
          $ref: "#/components/schemas/QuotaState"
      required: [plan, likes, superlikes]

    RewardStreak:
      type: object
      properties:
        current:
          type: integer
        longest:
          type: integer
      required: [current, longest]

    RewardCredits:
      type: object
      properties:
        likes:
          type: integer
        superlikes:
          type: integer
      required: [likes, superlikes]

    RewardsState:
      type: object
      properties:
        streak:
          $ref: "#/components/schemas/RewardStreak"
        claimable:
          type: boolean
        nextClaimAt:
          type: string
          nullable: true
          description: ISO time of the next UTC midnight; set when claimable is false.
        credits:
          $ref: "#/components/schemas/RewardCredits"
      required: [streak, claimable, nextClaimAt, credits]

    ClaimRewardResponse:
      type: object
      properties:
        streak:
          $ref: "#/components/schemas/RewardStreak"
        granted:
          $ref: "#/components/schemas/RewardCredits"
        credits:
          $ref: "#/components/schemas/RewardCredits"
        milestone:
          type: boolean
          description: True when this claim reached a SuperLike streak milestone.
      required: [streak, granted, credits, milestone]

    LikeRequest:
      type: object
      properties:
        kind:
          type: string
          enum: [like, superlike]

    LikeResponse:
      type: object
      properties:
        matched:
          type: boolean
        is_super:
          type: boolean
        already_processed:
          type: boolean
          description: >-
            True when this like/SuperLike was a repeat of an existing like edge
            (no new charge was made). A like→SuperLike upgrade is NOT
            already_processed (it charges one SuperLike).
        quota:
          $ref: "#/components/schemas/LikeQuota"
      required: [matched, is_super, quota]

    MatchNotification:
      type: object
      properties:
        user_id:
          type: string
        username:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        matched_at:
          type: string
      required: [user_id, username, avatar_url, matched_at]

    NotificationsSummary:
      type: object
      properties:
        unread_messages:
          type: integer
        likes:
          type: array
          items:
            $ref: "#/components/schemas/LikeNotification"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/MatchNotification"
        support_unread:
          type: integer
          description: Unread admin replies on the viewer's own support tickets
        official_unread:
          type: integer
          description: >-
            1 when the official "Soporte KixxMe" thread has an unread admin
            message for the viewer, else 0 (folded into the Messages badge)
        admin:
          $ref: "#/components/schemas/AdminNotificationSummary"
      required:
        [unread_messages, support_unread, official_unread, likes, matches]

    AdminNotificationSummary:
      type: object
      description: >-
        Moderation notification state, present only for admin users (absent for
        everyone else). Lets an admin's notification bell surface new reports and
        flags the same way regular users are notified of likes and matches.
      properties:
        open_reports:
          type: integer
        open_flags:
          type: integer
        open_tickets:
          type: integer
        latest_report_at:
          type: string
          nullable: true
        latest_ticket_at:
          type: string
          nullable: true
      required:
        [open_reports, open_flags, open_tickets, latest_report_at, latest_ticket_at]

    Session:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: number
      required: [access_token, refresh_token, expires_at]

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
      required: [id, email, username]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        session:
          oneOf:
            - $ref: "#/components/schemas/Session"
            - type: "null"
      required: [user, session]

    SignUpRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        username:
          type: string
      required: [email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]

    ForgotPasswordResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    ResetPasswordRequest:
      type: object
      properties:
        accessToken:
          type: string
          description: Recovery access token extracted from the reset link's URL hash
        password:
          type: string
          minLength: 6
      required: [accessToken, password]

    Profile:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        bio:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        city:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        last_active_at:
          type: string
          nullable: true
        plan:
          type: string
          nullable: true
        is_verified:
          type: boolean
        role:
          type: string
          enum: [activo, pasivo, versatil, versatil_activo, versatil_pasivo, sin_preferencias, no_decir]
          nullable: true
          description: Rol/Preferencia (single-select).
        looking_for:
          type: string
          enum: [amistad, chat, citas, relacion, encuentros, lo_que_surja]
          nullable: true
          description: "Qué buscas (single-select)."
        orientation:
          type: string
          enum: [gay, bisexual, curioso, heteroflexible, pansexual, demisexual, asexual, en_exploracion, no_decir]
          nullable: true
          description: Orientación sexual (single-select).
        height_cm:
