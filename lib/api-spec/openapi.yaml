          type: string
          enum: [free, plus, gold]
        is_verified:
          type: boolean
        photos:
          type: array
          items:
            $ref: "#/components/schemas/ProfilePhoto"
        selfie_url:
          type: string
          nullable: true
          description: >-
            Short-lived signed URL to the private identity selfie, for admin
