      type: object
      properties:
        reason:
          type: string
          description: Optional reason the call ended (e.g. hangup, reported)

    LiveDiagError:
      type: object
      description: A single captured media error (name + message only — no PII).
      properties:
        stage:
          type: string
          description: Where it happened (connect|combined|mic|camera|switch|toggle-cam|toggle-mic)
        name:
          type: string
          description: DOMException name (NotAllowedError, NotReadableError, …)
        message:
          type: string

    LiveDiagReport:
      type: object
      description: >-
        Client-side media diagnostics for one Live call, used to debug why a
        device can't capture/publish. Contains NO tokens and no PII beyond the
        userAgent string.
      properties:
        reason:
          type: string
          description: What triggered this snapshot (acquire|delayed|teardown)
        connectOk:
          type: boolean
          description: Whether room.connect() succeeded (separate from getUserMedia)
        connectError:
          $ref: "#/components/schemas/LiveDiagError"
        gumMode:
          type: string
          description: How local media was acquired (combined|mic-only|camera-only|failed|none)
        cameraAcquired:
          type: boolean
        micAcquired:
          type: boolean
        gumErrors:
          type: array
          items:
            $ref: "#/components/schemas/LiveDiagError"
        publishedCamera:
          type: boolean
          description: LocalTrackPublished fired for the camera track
        publishedMic:
          type: boolean
          description: LocalTrackPublished fired for the mic track
        subscribedVideo:
          type: boolean
          description: Subscribed to the partner's camera track
        subscribedAudio:
          type: boolean
          description: Subscribed to the partner's mic track
        videoInputsPre:
          type: integer
          description: enumerateDevices videoinput count before acquisition
        audioInputsPre:
          type: integer
        videoInputsPost:
          type: integer
          description: enumerateDevices videoinput count after acquisition
        audioInputsPost:
          type: integer
        connectionState:
          type: string
        disconnectReason:
          type: string
        userAgent:
          type: string
        isSecureContext:
          type: boolean
        standalone:
          type: boolean
          description: Running as an iOS Home-Screen PWA (navigator.standalone)
        mediaDevicesPresent:
          type: boolean
          description: navigator.mediaDevices is defined (false in insecure/odd contexts)
        cameraPermission:
          type: string
          description: navigator.permissions camera state (granted|denied|prompt|unknown)
        micPermission:
          type: string
          description: navigator.permissions microphone state
        localVideoWidth:
          type: integer
          description: videoWidth of the self-view <video> (>0 = local frames decoding)
        remoteVideoWidth:
          type: integer
          description: videoWidth of the remote <video> (>0 = remote frames decoding)
        cameraPubMuted:
          type: boolean
          description: Local camera publication isMuted (published but sending black)
        cameraTrackReadyState:
          type: string
          description: Local camera MediaStreamTrack.readyState (live|ended)
        cameraTrackMuted:
          type: boolean
          description: Local camera MediaStreamTrack.muted (true = producing no frames)
        cameraWidth:
          type: integer
          description: Local camera getSettings().width
        cameraHeight:
          type: integer
          description: Local camera getSettings().height
        localVideoPaused:
          type: boolean
          description: self-view <video>.paused (true = not playing → black on mobile)
        localVideoCurrentTime:
          type: number
          description: self-view <video>.currentTime (stuck at 0 = never painted a frame)
        localVideoReadyState:
          type: integer
          description: self-view <video>.readyState (0-4; <2 = no current frame)
        localClientWidth:
          type: integer
          description: self-view <video>.clientWidth (0 = laid out with no size → invisible)
        localClientHeight:
          type: integer
          description: self-view <video>.clientHeight
        localPlayError:
          type: string
          description: DOMException name if the self-view play() promise rejected
        remoteVideoPaused:
          type: boolean
          description: remote <video>.paused (true = not playing → black on mobile)
        remoteVideoCurrentTime:
          type: number
          description: remote <video>.currentTime (stuck at 0 = never painted a frame)
        remoteVideoReadyState:
          type: integer
          description: remote <video>.readyState (0-4; <2 = no current frame)
        remoteClientWidth:
          type: integer
          description: remote <video>.clientWidth (0 = laid out with no size → invisible)
        remoteClientHeight:
          type: integer
          description: remote <video>.clientHeight
        remotePlayError:
          type: string
          description: DOMException name if the remote play() promise rejected

