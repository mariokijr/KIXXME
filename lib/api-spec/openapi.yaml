openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: profiles
    description: User profile operations
  - name: conversations
    description: Conversations and messages
  - name: billing
    description: Subscription billing and checkout
  - name: support
    description: Support requests and problem reports
  - name: live
    description: KixxMe Live — Gold-only video calls (scaffold)
  - name: account
    description: Account self-service — deactivation and deletion (email-verified)
  - name: reports
    description: User-to-user moderation reports
  - name: moderation
    description: Current user's moderation state
  - name: admin
    description: Admin-only moderation dashboard
  - name: rewards
    description: Daily streaks and reward claims (gamification)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required: [message]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required: [refresh_token]
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/Session"
                required: [session]
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password-reset email
      description: >
        Always responds 200 to avoid leaking whether an account exists. When the
        email matches a user, a Spanish reset email with a time-limited link is
        sent. The reset redirect target is derived server-side (never client-
        supplied) to prevent open-redirect / phishing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Set a new password using a recovery token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated; a fresh session is returned when auto sign-in succeeds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired recovery link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get the current user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyProfile
      tags: [profiles]
      summary: Update the current user's profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/interests:
    get:
      operationId: getMyInterests
      tags: [profiles]
      summary: Get the current user's interest tags
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Interest list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyInterests
      tags: [profiles]
      summary: Replace the current user's interest tags (full replace)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterestsRequest"
      responses:
        "200":
          description: Updated interest list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestsResponse"
        "400":
          description: Invalid tag(s) or too many
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/tutorial:
    post:
      operationId: completeTutorial
      tags: [profiles]
      summary: Mark the mandatory onboarding tutorial as completed (idempotent)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated profile with tutorial_completed = true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/map-privacy-ack:
    post:
      operationId: ackMapPrivacy
      tags: [profiles]
      summary: Mark that the user has seen the map privacy notice (idempotent)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Acknowledged
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/live-privacy-ack:
    post:
      operationId: ackLivePrivacy
      tags: [profiles]
      summary: Mark that the user has seen the Live privacy notice (idempotent)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Acknowledged
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      summary: Get a public profile by user ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/avatar:
    post:
      operationId: uploadAvatar
      tags: [profiles]
      summary: Upload a profile photo (base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "200":
          description: Avatar URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  avatar_url:
                    type: string
                required: [avatar_url]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List public profiles for discovery (excludes current user)
      security:
        - bearerAuth: []
      parameters:
        - name: feed
          in: query
          required: false
          description: >
            Activity-based discovery feed. recommended=priority sort (verified+complete+active,
            default); online=currently online users sorted by proximity; new=recently registered;
            popular=most liked; compatible=matches viewer role/looking_for + shared interests.
          schema:
            type: string
            enum: [recommended, online, new, popular, compatible]
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, distance, online]
        - name: scope
          in: query
          required: false
          description: >
            Geographic scope filter (kept for map compatibility). nearby/province are
            relative to the viewer's location; spain/europe use bounding boxes;
            worldwide returns everyone.
          schema:
            type: string
            enum: [nearby, province, spain, europe, worldwide]
        - name: age_min
          in: query
          required: false
          description: Minimum age filter (inclusive). Free for all users.
          schema:
            type: integer
            minimum: 18
            maximum: 99
        - name: age_max
          in: query
          required: false
          description: Maximum age filter (inclusive). Free for all users.
          schema:
            type: integer
            minimum: 18
            maximum: 99
        - name: online_only
          in: query
          required: false
          description: When true, only return users active in the last 15 minutes. Free for all users.
          schema:
            type: boolean
        - name: verified_only
          in: query
          required: false
          description: Plus/Gold only — silently ignored for free users.
          schema:
            type: boolean
        - name: role
          in: query
          required: false
          description: Filter by sexual role (activo/pasivo/versatil/…). Plus/Gold only.
          schema:
            type: string
        - name: looking_for
          in: query
          required: false
          description: Filter by what the user is looking for. Plus/Gold only.
          schema:
            type: string
        - name: orientation
          in: query
          required: false
          description: Filter by orientation. Plus/Gold only.
          schema:
            type: string
        - name: distance_max_km
          in: query
          required: false
          description: Maximum distance in km. Free for all users.
          schema:
            type: number
        - name: country_only
          in: query
          required: false
          description: When true, restrict results to users in the same country as the caller (derived from lat/lng). Free for all users.
          schema:
            type: boolean
      responses:
        "200":
          description: Array of public profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/stats:
    get:
      operationId: getDiscoveryStats
      tags: [profiles]
      summary: Community stats for the world map (registered + online counts)
      description: >
        Counts of registered and currently-online users within the given scope,
        excluding the viewer and any blocked/deactivated users.
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [nearby, province, spain, europe, worldwide]
      responses:
        "200":
          description: Discovery stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /map/users:
    get:
      operationId: listMapUsers
      tags: [profiles]
      summary: Real-time map of nearby users
      description: >
        The KixxMe world map. Returns an envelope with `can_access` (always true
        for authenticated users) and the viewer's own `show_on_map` setting.
        `users` contains OTHER users who have coordinates, pass calidad mínima,
        and have "Mostrarme en el mapa" enabled (and aren't blocked/hidden). Raw
        coordinates never leave the server — only a rounded distance_km is
        exposed. When `search_lat`/`search_lng`/`search_radius_km` are provided
        the map is centered on that point for both filtering and distance
        calculation (geocoding search mode).
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [nearby, province, spain, europe, worldwide]
        - name: search_lat
          in: query
          required: false
          schema:
            type: number
        - name: search_lng
          in: query
          required: false
          schema:
            type: number
        - name: search_radius_km
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Map envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapUsersResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos:
    get:
      operationId: listMyPhotos
      tags: [profiles]
      summary: List current user's profile photos
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfilePhoto"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: uploadPhoto
      tags: [profiles]
      summary: Upload a profile photo (base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPhotoRequest"
      responses:
        "201":
          description: Uploaded photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilePhoto"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos/{photoId}:
    put:
      operationId: replacePhoto
      tags: [profiles]
      summary: Replace a profile photo's image in place
      security:
        - bearerAuth: []
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplacePhotoRequest"
      responses:
        "200":
          description: Replaced photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilePhoto"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePhoto
      tags: [profiles]
      summary: Delete a profile photo
      security:
        - bearerAuth: []
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/photos/{photoId}/avatar:
    patch:
      operationId: setPhotoAsAvatar
      tags: [profiles]
      summary: Set a photo as the avatar
      security:
        - bearerAuth: []
      parameters:
        - name: photoId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List current user's conversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrGetConversation
      tags: [conversations]
      summary: Get or create a conversation with another user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                other_user_id:
                  type: string
              required: [other_user_id]
      responses:
        "200":
          description: Existing conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "201":
          description: New conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >-
            Free user trying to start a conversation without a mutual match.
            Body carries code="gold_required_no_match".
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [conversations]
      summary: List messages in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a message in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/images:
    post:
      operationId: uploadChatImage
      tags: [conversations]
      summary: Upload an image to send in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "201":
          description: Uploaded image
          content:
            application/json:
              schema:
                type: object
                properties:
                  image_url:
                    type: string
                required: [image_url]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversations/{id}/audio:
    post:
      operationId: uploadChatAudio
      tags: [conversations]
      summary: Upload a voice note to send in a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "201":
          description: Uploaded voice note
          content:
            application/json:
              schema:
                type: object
                properties:
                  audio_url:
                    type: string
                required: [audio_url]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/location:
    put:
      operationId: updateMyLocation
      tags: [profiles]
      summary: Update the current user's GPS location
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationUpdateRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/map-visibility:
    put:
      operationId: updateMapVisibility
      tags: [profiles]
      summary: Toggle "Mostrarme en el mapa" (map visibility)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MapVisibilityRequest"
      responses:
        "200":
          description: Updated map visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MapVisibilityRequest"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/me/likes:
    get:
      operationId: listMyLikes
      tags: [profiles]
      summary: List profiles the current user has liked
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liked profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/online:
    get:
      operationId: listOnlineProfiles
      tags: [profiles]
      summary: List currently-online users ("En línea")
      description: >
        Profiles active within the online window, viewable by all users. Applies
