    MyVerificationStatus:
      type: object
      description: >-
        The current user's verification standing. `is_verified` is the Supabase
        source of truth for the badge; `status` derives the request-flow state.
      properties:
        status:
          type: string
          enum: [none, pending, approved, rejected]
        is_verified:
          type: boolean
        requested_at:
          type: string
          nullable: true
        reviewed_at:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
      required: [status, is_verified, requested_at, reviewed_at, note]

    RequestVerificationBody:
      type: object
      description: >-
        Identity selfie for a verification request. `selfie_base64` is the raw
        base64 (no data: prefix) of a downscaled JPEG/PNG/WebP; the server
        enforces a mime allowlist and a decoded-size cap.
      properties:
        selfie_base64:
          type: string
          minLength: 1
        selfie_mime_type:
          type: string
          enum: [image/jpeg, image/png, image/webp]
      required: [selfie_base64, selfie_mime_type]

