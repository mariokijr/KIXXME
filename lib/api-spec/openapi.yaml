      required: [id, username, avatar_url, age, city, is_verified, plan, visited_at]

    MyVisitorsResponse:
      type: object
      description: >-
        "Who viewed my profile". Everyone sees the deduped visitor `count`;
        `visitors` identities are populated only for Plus/Gold
        (`can_see_visitors`), empty otherwise.
      properties:
        count:
          type: integer
        can_see_visitors:
          type: boolean
        visitors:
          type: array
          items:
            $ref: "#/components/schemas/VisitorProfile"
      required: [count, can_see_visitors, visitors]

    AdminVerificationItem:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        username:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        age:
          type: integer
          nullable: true
        city:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        plan:
          type: string
          enum: [free, plus, gold]
        is_verified:
          type: boolean
        photos:
          type: array
          items:
            $ref: "#/components/schemas/ProfilePhoto"
        selfie_url:
          type: string
          nullable: true
          description: >-
            Short-lived signed URL to the private identity selfie, for admin
            review only. Null for legacy requests submitted before selfie
            verification existed.
        createdAt:
          type: string
      required: [id, userId, plan, is_verified, photos, createdAt]

    AdminVerificationList:
      type: object
      properties:
        verifications:
          type: array
          items:
            $ref: "#/components/schemas/AdminVerificationItem"
        total:
          type: integer
      required: [verifications, total]

    ReviewVerificationRequest:
      type: object
      properties:
        decision:
          type: string
          enum: [approve, reject]
        note:
          type: string
          maxLength: 2000
      required: [decision]
