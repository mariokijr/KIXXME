components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    CheckoutRequest:
      type: object
      properties:
        tier:
          type: string
          enum: [plus, gold]
        interval:
          type: string
          enum: [month, year]
        returnUrl:
          type: string
