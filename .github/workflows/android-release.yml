name: Build Android AAB

# Trigger manually from GitHub → Actions → "Build Android AAB" → Run workflow.
# Fill in version_name / version_code before each Play Store upload.
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name shown to users (e.g. 1.2.0)"
        required: false
        default: "1.0"
      version_code:
        description: "Version code — integer, must be higher than the last upload"
        required: false
        default: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java (Android build tools require JDK 17) ───────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Node / pnpm ─────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # ── 4. Android SDK 36 ──────────────────────────────────────────────────
      # ubuntu-latest ships SDK tools but may not include API 36 yet.
      # sdkmanager is at $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager.
      - name: Install Android SDK 36 + build-tools
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || true
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true

      # ── 5. Build the web bundle ────────────────────────────────────────────
      # BASE_PATH=/ because Capacitor loads files from the root of the device.
      # MOBILE_API_ORIGIN must be the full URL of your deployed API server,
      # e.g. https://kixxme.replit.app (no trailing slash).
      - name: Build Vite web app
        working-directory: artifacts/kixxme
        env:
          BASE_PATH: /
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MOBILE_API_ORIGIN: ${{ secrets.MOBILE_API_ORIGIN }}
          REVENUECAT_ANDROID_KEY: ${{ secrets.REVENUECAT_ANDROID_KEY }}
        run: pnpm run build

      # ── 6. Sync web assets into the Android project ────────────────────────
      - name: Capacitor sync Android
        working-directory: artifacts/kixxme
        run: npx cap sync android

      # ── 7. Signing — decode keystore from the base64 secret ───────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode \
            > artifacts/kixxme/android/app/kixxme-release-key.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=kixxme-release-key.jks"
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
          } > artifacts/kixxme/android/app/keystore.properties

      # ── 8. Bump version in build.gradle ───────────────────────────────────
      - name: Set versionCode and versionName
        run: |
          sed -i \
            "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" \
            artifacts/kixxme/android/app/build.gradle
          sed -i \
            "s/versionName \"[^\"]*\"/versionName \"${{ github.event.inputs.version_name }}\"/" \
            artifacts/kixxme/android/app/build.gradle

      # ── 9. Gradle build ────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x artifacts/kixxme/android/gradlew

      - name: Build release AAB
        working-directory: artifacts/kixxme/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # ── 10. Upload artifact (available for 30 days) ────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-v${{ github.event.inputs.version_name }}-${{ github.event.inputs.version_code }}
          path: artifacts/kixxme/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
