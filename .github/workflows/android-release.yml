name: Build Android AAB

# Trigger manually from GitHub → Actions → "Build Android AAB" → Run workflow.
# Fill in version_name / version_code before each Play Store upload.
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name shown to users (e.g. 1.2.0)"
        required: false
        default: "1.0.5"
      version_code:
        description: "Version code — integer, must be higher than the last upload"
        required: false
        default: "6"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source code ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java (Android build tools require JDK 17) ───────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 3. Node / pnpm ─────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # ── 4. Android SDK 36 ──────────────────────────────────────────────────
      # ubuntu-latest ships SDK tools but may not include API 36 yet.
      # sdkmanager is at $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager.
      - name: Install Android SDK 36 + build-tools
        run: |
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || true
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true

      # ── 5. Build the web bundle ────────────────────────────────────────────
      # CAPACITOR_BUILD=true  → Vite uses base:"./" so asset <script>/<link>
      #   tags are relative paths (./assets/…) instead of absolute (/assets/…).
      #   Relative paths always resolve correctly from index.html in the Android
      #   WebView regardless of the Capacitor URL scheme.
      # BASE_PATH=/ still required by vite.config.ts when CAPACITOR_BUILD is not set,
      #   but CAPACITOR_BUILD=true overrides it to "./" inside the config.
      # MOBILE_API_ORIGIN must be the full URL of your deployed API server,
      #   e.g. https://kixxme.replit.app (no trailing slash).
      - name: Build Vite web app
        working-directory: artifacts/kixxme
        env:
          CAPACITOR_BUILD: "true"
          BASE_PATH: /
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MOBILE_API_ORIGIN: ${{ secrets.MOBILE_API_ORIGIN }}
          REVENUECAT_ANDROID_KEY: ${{ secrets.REVENUECAT_ANDROID_KEY }}
        run: |
          echo "=== Env-var presence check ==="
          echo "SUPABASE_URL set:      $([[ -n "${SUPABASE_URL}" ]]      && echo YES || echo NO)"
          echo "SUPABASE_ANON_KEY set: $([[ -n "${SUPABASE_ANON_KEY}" ]] && echo YES || echo NO)"
          echo "MOBILE_API_ORIGIN set: $([[ -n "${MOBILE_API_ORIGIN}" ]] && echo YES || echo NO)"
          echo "CAPACITOR_BUILD:       ${CAPACITOR_BUILD}"
          echo "=== Building ==="
          pnpm run build
          echo "=== Build output ==="
          ls -lh dist/public/
          echo "--- dist/public/index.html ---"
          cat dist/public/index.html

      # ── 5b. DIAGNOSTIC: replace index.html with pure static HTML ───────────
      # This replaces the Vite-built index.html (which uses <script type="module">)
      # with a completely static page that has NO JS modules and NO React.
      # Purpose: definitively test whether the Capacitor WebView server can serve
      # ANY content at all. If the user sees this page, the server works and the
      # problem is with ES module scripts. If they still see black, the server is broken.
      - name: "DIAGNOSTIC: Replace index.html with pure static HTML"
        working-directory: artifacts/kixxme
        run: |
          cat > dist/public/index.html << 'STATIC_EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                background: #ffffff;
                color: #000000;
                font-family: -apple-system, sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px;
                text-align: center;
              }
              .ok { color: #008000; font-size: 28px; font-weight: bold; margin: 12px 0; }
              .pending { color: #cc8800; font-size: 22px; margin: 12px 0; }
              .version { color: #888888; font-size: 14px; margin-top: 24px; }
            </style>
          </head>
          <body>
            <div style="font-size:64px; margin-bottom:20px">🟢</div>
            <div class="ok">HTML CARGADO ✓</div>
            <div class="pending" id="js-status">JS pendiente...</div>
            <div class="ok" id="js-ok" style="display:none">JS EJECUTADO ✓</div>
            <div class="version">v1.0.5 · diagnóstico puro</div>
            <script>
              document.getElementById('js-status').style.display = 'none';
              document.getElementById('js-ok').style.display = 'block';
            </script>
          </body>
          </html>
          STATIC_EOF
          echo "=== Replaced index.html with pure static diagnostic ==="
          cat dist/public/index.html

      # ── 6. Sync web assets into the Android project ────────────────────────
      - name: Capacitor sync Android
        working-directory: artifacts/kixxme
        run: npx cap sync android

      # ── 6b. Verify sync output ─────────────────────────────────────────────
      - name: Verify Android assets after sync
        run: |
          echo "=== Checking synced assets ==="
          ASSETS="artifacts/kixxme/android/app/src/main/assets/public"
          if [ -d "${ASSETS}" ]; then
            echo "assets/public EXISTS ✓"
            ls -lh "${ASSETS}/"
            echo "--- Android index.html (first 60 lines) ---"
            head -60 "${ASSETS}/index.html"
          else
            echo "MISSING: ${ASSETS} — cap sync did not copy web assets!"
            exit 1
          fi

      # ── 7. Signing — decode keystore from the base64 secret ───────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode \
            > artifacts/kixxme/android/app/kixxme-release-key.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          {
            echo "storeFile=kixxme-release-key.jks"
            echo "storePassword=${STORE_PASSWORD}"
            echo "keyAlias=${KEY_ALIAS}"
            echo "keyPassword=${KEY_PASSWORD}"
            echo "storeType=PKCS12"
          } > artifacts/kixxme/android/app/keystore.properties

      # ── 8. Bump version in build.gradle ───────────────────────────────────
      - name: Set versionCode and versionName
        run: |
          sed -i \
            "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" \
            artifacts/kixxme/android/app/build.gradle
          sed -i \
            "s/versionName \"[^\"]*\"/versionName \"${{ github.event.inputs.version_name }}\"/" \
            artifacts/kixxme/android/app/build.gradle

      # ── 9. Gradle build ────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x artifacts/kixxme/android/gradlew

      - name: Build release AAB
        working-directory: artifacts/kixxme/android
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # ── 10. Upload artifact (available for 30 days) ────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-v${{ github.event.inputs.version_name }}-${{ github.event.inputs.version_code }}
          path: artifacts/kixxme/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
