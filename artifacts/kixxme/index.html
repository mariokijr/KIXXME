<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>KixxMe</title>
    <meta name="theme-color" content="#080712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KixxMe" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <script>
      (function () {
        var shown = false;
        function showError(title, detail) {
          if (shown) return;
          shown = true;
          var el = document.getElementById('root');
          if (!el) return;
          el.innerHTML =
            '<div style="padding:32px;background:#080712;color:#ff6b6b;' +
            'font-family:monospace;font-size:16px;min-height:100vh;' +
            'box-sizing:border-box;word-break:break-all">' +
            '<div style="font-size:24px;font-weight:bold;margin-bottom:16px">' +
            'Error de inicio</div>' +
            '<div style="margin-bottom:12px">' + title + '</div>' +
            '<pre style="font-size:12px;white-space:pre-wrap;color:#aaa">' +
            detail + '</pre></div>';
        }
        window.addEventListener('error', function (e) {
          showError(
            e.message || 'Error desconocido',
            (e.filename || '') + ':' + (e.lineno || '')
          );
        });
        window.addEventListener('unhandledrejection', function (e) {
          showError('Promise rechazada', String(e.reason));
        });
      })();
    </script>
  </head>
  <body style="margin:0;padding:0;background:#080712;">
    <div id="root">
      <div style="
        background:#080712;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
      ">
        <div style="
          width:48px;height:48px;
          border:4px solid #2d1b4e;
          border-top-color:#a855f7;
          border-radius:50%;
          animation:spin 0.8s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
