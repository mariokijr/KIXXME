<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>KixxMe</title>
    <meta name="theme-color" content="#080712" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KixxMe" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <!-- Global JS error handler — shows errors visually BEFORE React mounts -->
    <script>
      (function () {
        var shown = false;
        function showError(title, detail) {
          if (shown) return;
          shown = true;
          var el = document.getElementById('root');
          if (!el) return;
          el.innerHTML =
            '<div style="padding:32px;background:#ffffff;color:#cc0000;' +
            'font-family:monospace;font-size:18px;min-height:100vh;' +
            'box-sizing:border-box;word-break:break-all">' +
            '<div style="font-size:28px;font-weight:bold;margin-bottom:16px">' +
            '❌ ERROR DE INICIO</div>' +
            '<div style="margin-bottom:12px">' + title + '</div>' +
            '<pre style="font-size:13px;white-space:pre-wrap">' +
            detail + '</pre></div>';
        }
        window.addEventListener('error', function (e) {
          showError(
            'JavaScript Error',
            (e.message || 'Unknown error') + '\n' +
            (e.filename || '') + ':' + (e.lineno || '')
          );
        });
        window.addEventListener('unhandledrejection', function (e) {
          showError('Unhandled Promise Rejection', String(e.reason));
        });
      })();
    </script>
  </head>
  <body style="margin:0;padding:0;background:#ffffff;">
    <div id="root">
      <!--
        PLACEHOLDER — white background, large RED text.
        Visible the instant index.html loads, before any JS runs.
        If you see this and NOT the white "WEBVIEW Y REACT CARGADOS" screen,
        then HTML loads but JS modules are failing.
        If you see nothing / black, Capacitor isn't serving index.html.
      -->
      <div style="
        background: #ffffff;
        color: #cc0000;
        font-family: sans-serif;
        font-size: 36px;
        font-weight: bold;
        padding: 60px 40px;
        min-height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      ">
        <div style="font-size: 64px; margin-bottom: 20px">⏳</div>
        <div>HTML CARGADO</div>
        <div style="font-size: 20px; color: #888; margin-top: 16px">Cargando JS...</div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
